# H2 in-memory DB - PostgreSQL 없이 로컬 실행 시 사용
# 실행: ./gradlew bootRun --args='--spring.profiles.active=dev'
spring:
  datasource:
    url: jdbc:h2:mem:market;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
